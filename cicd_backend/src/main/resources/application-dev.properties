spring.application.name=CI-CD_monitoring_project

# Development Profile Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/cicd_monitoring_system_dev
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (for development)
jwt.secret=dev-super-secret-key-change-in-production-1234567890

# Server Configuration
server.port=9090

# Bootstrap Admin (for development)
app.bootstrap.admin-username=admin
app.bootstrap.admin-password=admin123

# Webhook Configuration
webhook.secret=dev-webhook-secret

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging
logging.level.root=INFO
logging.level.com.myproject.CI.CD_monitoring_project=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
