spring.application.name=CI-CD_monitoring_project

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cicd_monitoring_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Use a long random value in production (override via JWT_SECRET)
jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey123456}

server.port=${SERVER_PORT:9090}

# Optional: if the database has no users, one ADMIN is created on startup.
app.bootstrap.admin-username=${BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:}

# If set, Jenkins (or callers) must send header X-Webhook-Secret with this value.
webhook.secret=${WEBHOOK_SECRET:}

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.myproject.CI.CD_monitoring_project=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
