spring.application.name=CI-CD_monitoring_project

# Production Profile Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration (MUST be set via environment variable in production)
jwt.secret=${JWT_SECRET}

# Server Configuration
server.port=${SERVER_PORT:8080}

# Bootstrap Admin (Should NOT be set in production)
app.bootstrap.admin-username=
app.bootstrap.admin-password=

# Webhook Configuration (MUST be set via environment variable)
webhook.secret=${WEBHOOK_SECRET}

# OpenAPI/Swagger Configuration (disable in production)
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.enabled=false

# Logging (production logging)
logging.level.root=WARN
logging.level.com.myproject.CI.CD_monitoring_project=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
